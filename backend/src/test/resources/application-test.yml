server:
  port: 0

spring:
  application:
    name: becasfind-test

  datasource:
    url: jdbc:h2:mem:becasfind;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      data-locations: classpath:data-test.sql

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    expiration-ms: 86400000

logging:
  level:
    root: WARN
    com.becasfind.api: INFO
