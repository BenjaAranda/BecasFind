server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: becasfind-api

    config:
      import: optional:file:.env[.propierties]

  # MySQL Database Configuration (Local)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # SQL Data Seeding
  sql:
    init:
      mode: always

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration (Clave temporal para desarrollo local)
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Logging
logging:
  level:
    root: INFO
    com.becasfind.api: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG