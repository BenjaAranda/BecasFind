server:
  port: 8080

spring:
  application:
    name: becasfind-api

  # MySQL Database Configuration (Local)
  datasource:
    url: jdbc:mysql://mysql:3306/becasfind?serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: becasfind.123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # SQL Data Seeding
  sql:
    init:
      mode: always

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration (Clave temporal para desarrollo local)
app:
  jwt:
    secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    expiration-ms: 86400000

# Logging
logging:
  level:
    root: INFO
    com.becasfind.api: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG